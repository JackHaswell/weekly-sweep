<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sweep" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <title>Weekly Sweep</title>
</head>
<body>
  <!-- HOME VIEW -->
  <section id="view-home" class="view">
    <div class="home-inner">
      <p class="kicker">Weekly Task Capture</p>
      <h1 class="home-title">Sunday Sweep</h1>
      <p class="home-sub">One button. I read your week — email, WhatsApp, texts, meetings — and hand you a single list to tick or bin.</p>

      <button id="btn-sweep" class="sweep-btn">
        <span class="sweep-btn__label">Run Sunday Sweep</span>
        <span class="sweep-btn__sub" id="sweep-week"></span>
      </button>

      <div class="home-meta" id="home-meta"></div>

      <button id="btn-tasks" class="link-btn">📝 My tasks <span id="tasks-count" class="pill">0</span></button>
    </div>
  </section>

  <!-- TASKS VIEW -->
  <section id="view-tasks" class="view hidden">
    <header class="topbar">
      <button id="btn-tasks-back" class="iconbtn" aria-label="Back">‹</button>
      <div class="topbar__title">
        <span>My tasks</span>
        <small id="tasks-sub"></small>
      </div>
      <div class="topbar__spacer"></div>
    </header>

    <div class="quickadd">
      <input id="qa-input" class="qa-input" placeholder="Add a task…" autocomplete="off" enterkeyhint="done" />
      <button id="qa-add" class="qa-add" aria-label="Add task">＋</button>
    </div>
    <div class="quickadd-more">
      <button id="qa-toggle" class="qa-toggle" type="button">+ date / appointment</button>
      <div id="qa-details" class="qa-details hidden">
        <textarea id="qa-detail" class="qa-detail" rows="2" placeholder="Notes (optional)"></textarea>
        <label class="qa-row"><input type="checkbox" id="qa-isappt" /> <span>This is an appointment</span></label>
        <label class="qa-row" id="qa-due-row"><span>Due date</span><input type="date" id="qa-due" /></label>
        <label class="qa-row hidden" id="qa-when-row"><span>When</span><input type="datetime-local" id="qa-when" /></label>
        <label class="qa-row hidden" id="qa-loc-row"><span>Where</span><input type="text" id="qa-loc" placeholder="Location (optional)" /></label>
      </div>
    </div>

    <main id="tasks-list" class="list"></main>
  </section>

  <!-- REVIEW VIEW -->
  <section id="view-review" class="view hidden">
    <header class="topbar">
      <button id="btn-back" class="iconbtn" aria-label="Back">‹</button>
      <div class="topbar__title">
        <span id="review-title">Review</span>
        <small id="review-sub"></small>
      </div>
      <div class="topbar__spacer"></div>
    </header>

    <div class="progress"><div id="progress-bar" class="progress__bar"></div></div>

    <main id="list" class="list"></main>

    <footer class="actionbar">
      <div class="actionbar__counts" id="counts"></div>
      <button id="btn-submit" class="submit-btn" disabled>Send approved →</button>
    </footer>
  </section>

  <!-- SUMMARY MODAL -->
  <div id="summary" class="modal hidden">
    <div class="modal__card">
      <h2>What I'll do</h2>
      <div id="summary-body"></div>
      <div class="modal__actions">
        <button id="btn-summary-close" class="ghost-btn">Back</button>
        <button id="btn-confirm" class="submit-btn">Confirm &amp; push</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
